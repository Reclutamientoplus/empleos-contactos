<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Candidatos</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 10px; }
        p { text-align: center; color: #5f6368; margin-bottom: 25px; font-size: 15px; }
        label { display: block; margin-top: 15px; color: #3c4043; font-weight: 600; font-size: 14px; }
        input, textarea { width: 100%; padding: 12px; margin-top: 8px; border: 1.5px solid #dadce0; border-radius: 6px; box-sizing: border-box; font-size: 14px; transition: border-color 0.2s; }
        input:focus, textarea:focus { outline: none; border-color: #1a73e8; }
        button { width: 100%; background-color: #1a73e8; color: white; border: none; padding: 14px; margin-top: 25px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background-color 0.2s; }
        button:hover { background-color: #1557b0; }
        .footer-note { font-size: 12px; color: #9aa0a6; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Registro para Empleo</h2>
    <p>Completa tus datos para ayudarte a encontrar una oportunidad laboral.</p>
    
<form action="https://script.google.com/macros/s/AKfycbxVHK-xrwWzU6b9alRlt3H9L9rdhL8xqg_O71I4Gp8JDYOTVObKulKM6hkOxAlt_UCb/exec" method="POST">     
        <label for="nombre">Nombre Completo:</label>
        <input type="text" id="nombre" name="nombre" placeholder="Ej: Juan Pérez" required>

        <label for="telefono">WhatsApp / Teléfono:</label>
        <input type="tel" id="telefono" name="telefono" placeholder="Ej: +001 8888 8888" required>

        <label for="email">Correo Electrónico :</label>
        <input type="email" id="email" name="email" placeholder="ejemplo@correo.com">

        <label for="puesto">Puesto o Área de Interés:</label>
        <input type="text" id="puesto" name="puesto" placeholder="Ej: Ventas, Redacción, Administración" required>

        <label for="experiencia">Experiencia o Resumen Profesional:</label>
        <textarea id="experiencia" name="experiencia" rows="4" placeholder="Cuéntame brevemente en qué has trabajado antes..."></textarea>

       <button type="submit">Enviar mis datos</button>
    <div class="footer-note">
        Tus datos serán revisados únicamente para fines de reclutamiento...
    </div>
</form> </div>

</body>

</html>
